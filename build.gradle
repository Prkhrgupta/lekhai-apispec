plugins {
    id 'java-library'        // IMPORTANT: use this instead of 'java'
    id 'maven-publish'
}

group = 'in.lekhai'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

sourceSets {
    main {
        java {
            srcDirs = ['generated/spring/src/main/java']
        }
    }
}

repositories {
    mavenCentral()
}

dependencies {
    api platform('org.springframework.boot:spring-boot-dependencies:3.2.5')
    api 'org.springframework:spring-web'
    api 'org.springframework:spring-context'
    api 'jakarta.validation:jakarta.validation-api'
    api 'jakarta.annotation:jakarta.annotation-api'

    api 'io.swagger.core.v3:swagger-annotations:2.2.21'
    api 'org.openapitools:jackson-databind-nullable:0.2.6'
}

publishing {
    publications {
        maven(MavenPublication) {
            from components.java

            groupId = project.group
            artifactId = 'lekhaiapispec'
            version = project.version
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}