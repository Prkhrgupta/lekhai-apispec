Error:
  type: object
  properties:
    success:
      type: boolean
      example: false
    message:
      type: string
      nullable: true
      example: null
    data:
      type: object
      nullable: true
    error:
      type: string
      example: "Unexpected error"
    timestamp:
      type: string
      format: date-time

DropdownItem:
  type: object
  required:
    - label
  properties:
    id:
      type: integer
      format: int64
      description: Unique identifier for the dropdown option
      example: 1
    label:
      type: string
      description: Display text for the dropdown option
      example: "Option 1"
    code:
      type: string
      description: generic Unique identifier, if id is not applicable
      example: "JP"

responses:
  UnauthorizedError:
    description: Access token is missing or invalid
    content:
      application/json:
        schema:
          $ref: '#/Error'
  ForbiddenError:
    description: User is not authorized to perform this action
    content:
      application/json:
        schema:
          $ref: '#/Error'
  InternalServerError:
    description: Internal server error
    content:
      application/json:
        schema:
          $ref: '#/Error'
