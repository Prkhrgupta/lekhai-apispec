paths:
  /broker:
    post:
      tags: [Broker]
      summary: Create broker
      operationId: createBroker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../broker/components.yaml#/BrokerRequest'
      responses:
        '200':
          description: Broker created
          content:
            application/json:
              schema:
                $ref: '../broker/components.yaml#/BrokerResponse'
        '401':
          $ref: '../../common/components.yaml#/responses/UnauthorizedError'
        '403':
          $ref: '../../common/components.yaml#/responses/ForbiddenError'
        '500':
          $ref: '../../common/components.yaml#/responses/InternalServerError'
    get:
      tags: [Broker]
      summary: get broker options for dropdown
      operationId: getBrokerDropdownOptions
      responses:
        '200':
          description: Dropdown options for broker
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../../common/components.yaml#/DropdownItem'
        '401':
          $ref: '../../common/components.yaml#/responses/UnauthorizedError'
        '403':
          $ref: '../../common/components.yaml#/responses/ForbiddenError'
        '500':
          $ref: '../../common/components.yaml#/responses/InternalServerError'
