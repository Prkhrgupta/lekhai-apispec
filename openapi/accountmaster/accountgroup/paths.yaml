paths:
  /account-group:
    post:
      tags: [Account Group]
      summary: Create account group
      operationId: createAccountGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../accountgroup/components.yaml#/AccountGroupRequest'
      responses:
        '200':
          description: Account group created
          content:
            application/json:
              schema:
                $ref: '../accountgroup/components.yaml#/AccountGroupResponse'
        '401':
          $ref: '../../common/components.yaml#/responses/UnauthorizedError'
        '403':
          $ref: '../../common/components.yaml#/responses/ForbiddenError'
        '500':
          $ref: '../../common/components.yaml#/responses/InternalServerError'
    get:
      tags: [Account Group]
      summary: List account groups
      operationId: listAllAccountGroups
      responses:
        '200':
          description: List of account groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../accountgroup/components.yaml#/AccountGroupResponse'
        '401':
          $ref: '../../common/components.yaml#/responses/UnauthorizedError'
        '403':
          $ref: '../../common/components.yaml#/responses/ForbiddenError'
        '500':
          $ref: '../../common/components.yaml#/responses/InternalServerError'
