AccountGroupRequest:
  type: object
  required: [name, parentId]
  properties:
    name:
      type: string
      example: Fixed Assets
    parentId:
      type: integer
      format: int64
      example: 5

AccountGroupResponse:
  type: object
  properties:
    id:
      type: integer
      format: int64
    name:
      type: string
      example: Sundry Creditor
