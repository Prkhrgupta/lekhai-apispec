paths:
  /transport:
    post:
      tags: [Transport]
      summary: Create transport
      operationId: createTransport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../transport/components.yaml#/TransportRequest'
      responses:
        '200':
          description: Transport created
          content:
            application/json:
              schema:
                $ref: '../transport/components.yaml#/TransportResponse'
        '401':
          $ref: '../../common/components.yaml#/responses/UnauthorizedError'
        '403':
          $ref: '../../common/components.yaml#/responses/ForbiddenError'
        '500':
          $ref: '../../common/components.yaml#/responses/InternalServerError'
    get:
      tags: [Transport]
      summary: get dropdown options for transport
      operationId: getTransportDropdownOptions
      responses:
        '200':
          description: Dropdown options for transport
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../../common/components.yaml#/DropdownItem'
        '401':
          $ref: '../../common/components.yaml#/responses/UnauthorizedError'
        '403':
          $ref: '../../common/components.yaml#/responses/ForbiddenError'
        '500':
          $ref: '../../common/components.yaml#/responses/InternalServerError'
