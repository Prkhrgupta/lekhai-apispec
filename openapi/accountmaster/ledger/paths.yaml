paths:
  /ledger:
    post:
      tags: [Ledger]
      summary: Create ledger
      operationId: createLedger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../ledger/components.yaml#/LedgerRequest'
      responses:
        '200':
          description: Ledger created
          content:
            application/json:
              schema:
                $ref: '../ledger/components.yaml#/LedgerResponse'
        '401':
          $ref: '../../common/components.yaml#/responses/UnauthorizedError'
        '403':
          $ref: '../../common/components.yaml#/responses/ForbiddenError'
        '500':
          $ref: '../../common/components.yaml#/responses/InternalServerError'
    get:
      tags: [Ledger]
      summary: List all ledgers
      operationId: listLedgers
      responses:
        '200':
          description: List of ledgers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../ledger/components.yaml#/LedgerResponse'
        '401':
          $ref: '../../common/components.yaml#/responses/UnauthorizedError'
        '403':
          $ref: '../../common/components.yaml#/responses/ForbiddenError'
        '500':
          $ref: '../../common/components.yaml#/responses/InternalServerError'
  /ledger/{id}:
    get:
      tags: [Ledger]
      summary: Get ledger by ID
      operationId: getLedger
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Ledger details
          content:
            application/json:
              schema:
                $ref: '../ledger/components.yaml#/LedgerResponse'
        '401':
          $ref: '../../common/components.yaml#/responses/UnauthorizedError'
        '403':
          $ref: '../../common/components.yaml#/responses/ForbiddenError'
        '500':
          $ref: '../../common/components.yaml#/responses/InternalServerError'
    put:
      tags: [Ledger]
      summary: Update ledger
      operationId: updateLedger
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../ledger/components.yaml#/LedgerRequest'
      responses:
        '200':
          description: Ledger updated
          content:
            application/json:
              schema:
                $ref: '../ledger/components.yaml#/LedgerResponse'
        '401':
          $ref: '../../common/components.yaml#/responses/UnauthorizedError'
        '403':
          $ref: '../../common/components.yaml#/responses/ForbiddenError'
        '500':
          $ref: '../../common/components.yaml#/responses/InternalServerError'
  /ledger/summary:
    get:
      tags: [Ledger]
      summary: Get ledger summary with pagination and filtering
      operationId: getLedgerSummaries
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number (1-indexed)
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
          description: Number of items per page
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search query — partial, case-insensitive match across searchable columns
        - name: search_field
          in: query
          required: false
          schema:
            type: string
            enum: [name, state, area, accountGroup, gstin]
          description: Restrict search to a specific column. If omitted, searches all columns.
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            enum: [id, name, state, area, accountGroup, gstin]
            default: name
          description: Column to sort by
        - name: sort_order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: Sort direction
      responses:
        '200':
          description: Paginated ledger summary response
          content:
            application/json:
              schema:
                $ref: '../ledger/components.yaml#/LedgerSummaryResponse'
        '401':
          $ref: '../../common/components.yaml#/responses/UnauthorizedError'
        '403':
          $ref: '../../common/components.yaml#/responses/ForbiddenError'
        '500':
          $ref: '../../common/components.yaml#/responses/InternalServerError'
