AreaRequest:
  type: object
  required: [areaName, stateCode]
  properties:
    areaName:
      type: string
      example: Kanpur
    stateCode:
      type: string
      example: UP

AreaResponse:
  type: object
  properties:
    id:
      type: integer
      format: int64
    areaName:
      type: string
      example: Kanpur
    stateCode:
      type: string
      example: UP
    shopCode:
      type: integer
      example: 1234
    createdAt:
      type: string
      format: date-time
