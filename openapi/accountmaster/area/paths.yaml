paths:
  /area:
    post:
      tags: [Area]
      summary: Create area
      operationId: createArea
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../area/components.yaml#/AreaRequest'
      responses:
        '201':
          description: Area created
          content:
            application/json:
              schema:
                $ref: '../area/components.yaml#/AreaResponse'
        '401':
          $ref: '../../common/components.yaml#/responses/UnauthorizedError'
        '403':
          $ref: '../../common/components.yaml#/responses/ForbiddenError'
        '500':
          $ref: '../../common/components.yaml#/responses/InternalServerError'
    get:
      tags: [Area]
      summary: get Area options for dropdown
      operationId: getAreaDropdownOptions
      responses:
        '200':
          description: Dropdown options for area
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../../common/components.yaml#/DropdownItem'
        '401':
          $ref: '../../common/components.yaml#/responses/UnauthorizedError'
        '403':
          $ref: '../../common/components.yaml#/responses/ForbiddenError'
        '500':
          $ref: '../../common/components.yaml#/responses/InternalServerError'