MenuItem:
  type: object
  required: [id, title, icon]
  properties:
    id:
      type: string
    title:
      type: string
    icon:
      type: string
    route:
      type: string
    children:
      type: array
      items:
        $ref: '#/MenuItem'

MenuResponse:
  type: object
  properties:
    Main Menu:
      type: array
      items:
        $ref: '#/MenuItem'
    Favourites:
      type: array
      items:
        $ref: '#/MenuItem'

TopBarResponse:
  type: object
  required: [firmName, gstin, name]
  properties:
    firmName:
      type: string
    gstin:
      type: string
    name:
      type: string
