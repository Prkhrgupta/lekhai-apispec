components:
  parameters:
    FromDateParam:
      name: fromDate
      in: query
      required: true
      schema:
        type: string
        format: date   # yyyy-MM-dd
      example: "2026-04-01"

    ToDateParam:
      name: toDate
      in: query
      required: true
      schema:
        type: string
        format: date   # yyyy-MM-dd
      example: "2026-04-27"

    IncludeDeliveredParam:
      name: includeDelivered
      in: query
      required: false
      schema:
        type: boolean
      example: false

    StatusParam:
      name: status
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/EwbStatus'
      example: "ACTIVE"

    DateParam:
      name: date
      in: query
      required: true
      schema:
        type: string
        format: date-time   # ISO 8601
      example: "2026-04-27T15:30:00Z"

    EwbNoPathParam:
      name: ewbNo
      in: path
      required: true
      schema:
        type: string
      example: "451716215301"

  schemas:
    EwbStatus:
      type: string
      enum:
        - ACTIVE
        - REJECTED
      description: Status of the EWB

    EwbSummary:
      type: object
      required:
        - ewbNo
        - ewbDate
        - vehicleNo
        - consigner
        - consignee
        - docNo
        - docDate
        - destination
        - source
        - validUpTo
        - isDelivered
        - status
        - actualDistance
      properties:
        ewbNo:
          type: string
          example: "451716215301"
        ewbDate:
          type: string
          format: date-time
          example: "2026-04-24T10:30:00Z"
        status:
          $ref: '#/components/schemas/EwbStatus'
        docNo:
          type: string
          example: "C09AB27100001171"
        docDate:
          type: string
          format: date-time
          example: "2026-04-24T00:00:00Z"
        destination:
          type: string
          example: "MAINPURI, UP"
        source:
          type: string
          example: "KANPUR, UP"
        validUpTo:
          type: string
          format: date-time
          example: "2026-04-27T11:20:00Z"
        isDelivered:
          type: boolean
          example: false
        consigner:
          type: string
          example: "RAMDAYAL & SONS Pvt Limited"
        consignee:
          type: string
          example: "ITC Limited"
        actualDistance:
          type: integer
          example: 198
        vehicleNo:
          type: string
          example: UP77T1727

    ExtensionReason:
      type: string
      enum:
        - NATURAL_CALAMITY
        - LAW_AND_ORDER
        - TRANSSHIPMENT
        - ACCIDENT
        - OTHERS
      description: Reason for extension of validity

    EwbDetails:
      type: object
      required:
        - ewbNo
        - ewbDate
        - fromState
        - fromPlace
        - fromPinCode
        - toState
        - toPlace
        - toPinCode
        - transDocNo
        - transDocDate
        - vehicleNo
        - consigner
        - consignee
        - actualDistance
        - vehicleDetails
      properties:
        ewbNo:
          type: string
          example: "521008831493"
        ewbDate:
          type: string
          format: date-time
          example: "2022-01-19T18:08:00Z"
        fromPlace:
          type: string
          example: "FRAZER TOWN"
        fromState:
          type: string
          example: "Karnataka"
        toPlace:
          type: string
          example: "Beml Nagar"
        toState:
          type: string
          example: "Karnataka"
        transDocNo:
          type: string
          example: ""
        transDocDate:
          type: string
          format: date-time
          example: null
        fromPinCode:
          type: integer
          example: 605001
        toPinCode:
          type: integer
          example: 562160
        vehicleNo:
          type: string
          example: UP77T1727
        consigner:
          type: string
          example: RAMDAYAL & SONS Pvt Limited
        consignee:
          type: string
          example: ITC Limited
        actualDistance:
          type: integer
          example: 198
        vehicleDetails:
          type: array
          items:
            $ref: '#/components/schemas/VehicleDetail'

    VehicleDetail:
      type: object
      properties:
        vehicleNo:
          type: string
          example: "UP77T1727"
        fromPlace:
          type: string
          example: "Kanpur"
        fromState:
          type: string
          example: "UP"

    EwbExtendRequest:
      type: object
      required:
        - remainingDistance
        - extensionReason
        - extensionRemark
      properties:
        remainingDistance:
          type: integer
          example: 150
        extensionReason:
          $ref: '#/components/schemas/ExtensionReason'
        extensionRemark:
          type: string
          example: "Road blocked due to landslide"

    EwbExtendResponse:
      type: object
      required:
        - ewbNo
        - updatedDate
        - validUpto
      properties:
        ewbNo:
          type: string
          example: "161000843009"
        updatedDate:
          type: string
          format: date-time
          example: "2018-04-26T17:07:00Z"
        validUpto:
          type: string
          format: date-time
          example: "2018-05-21T23:59:00Z"