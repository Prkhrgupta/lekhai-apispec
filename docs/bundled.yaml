openapi: 3.0.3
info:
  title: Lekhai API
  description: API specification for Lekhai backend services
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server
security:
  - bearerAuth: []
tags:
  - name: Lekhai
    description: Lekhai APIs
paths:
  /lekhai/login:
    get:
      tags:
        - Auth
      summary: Login to the application
      operationId: login
      description: Authenticates the user using Basic Authentication and returns a JWT token or a list of shops if multiple are available.
      security:
        - basicAuth: []
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /lekhai/login/withShopCode:
    get:
      tags:
        - Auth
      summary: Login with Shop Code
      operationId: generateTokenWithShopCode
      description: Authenticates the user using Basic Authentication and a shop code provided in the header.
      parameters:
        - name: shop-code
          in: header
          required: true
          description: The code of the shop to login to.
          schema:
            type: integer
      security:
        - basicAuth: []
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /area/create:
    post:
      tags:
        - area
      summary: Create area
      operationId: createArea
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AreaRequest'
      responses:
        '200':
          description: Area created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AreaResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /area/list-all:
    get:
      tags:
        - area
      summary: List areas
      operationId: listAreas
      responses:
        '200':
          description: List of areas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AreaResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/account-group/create:
    post:
      tags:
        - account-group
      summary: Create account group
      operationId: createAccountGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountGroupRequest'
      responses:
        '200':
          description: Account group created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountGroupResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/account-group/list-all:
    get:
      tags:
        - account-group
      summary: List account groups
      operationId: listAccountGroups
      responses:
        '200':
          description: List of account groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountGroupResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/broker/create:
    post:
      tags:
        - broker
      summary: Create broker
      operationId: createBroker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BrokerRequest'
      responses:
        '200':
          description: Broker created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrokerResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/broker/list-all:
    get:
      tags:
        - broker
      summary: List brokers
      operationId: listBrokers
      responses:
        '200':
          description: List of brokers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BrokerResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/ledger/create:
    post:
      tags:
        - ledger
      summary: Create ledger
      operationId: createLedger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LedgerRequest'
      responses:
        '200':
          description: Ledger created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LedgerResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/ledger/list-all:
    get:
      tags:
        - ledger
      summary: List all ledgers
      operationId: listLedgers
      responses:
        '200':
          description: List of ledgers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LedgerResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/ledger/{id}:
    get:
      tags:
        - ledger
      summary: Get ledger by ID
      operationId: getLedger
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Ledger details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LedgerResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - ledger
      summary: Update ledger
      operationId: updateLedger
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LedgerRequest'
      responses:
        '200':
          description: Ledger updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LedgerResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/ledger/ledgers/summary:
    get:
      tags:
        - ledger
      summary: Get ledger summary
      operationId: getLedgerSummaries
      responses:
        '200':
          description: Ledger summary response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LedgerSummaryResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/state/list-all:
    get:
      tags:
        - state
      summary: List all states
      operationId: listAllStates
      responses:
        '200':
          description: List of states
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StateResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/transport/create:
    post:
      tags:
        - transport
      summary: Create transport
      operationId: createTransport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransportRequest'
      responses:
        '200':
          description: Transport created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransportResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/transport/list-all:
    get:
      tags:
        - transport
      summary: List transports
      operationId: listTransports
      responses:
        '200':
          description: List of transports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransportResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/menu:
    get:
      tags:
        - Menu
      summary: Get user menu
      operationId: getMenu
      description: Returns the main menu and favorites for the authenticated user based on their permissions.
      responses:
        '200':
          description: Successful retrieval of menu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ShopMenu:
      type: object
      properties:
        name:
          type: string
          example: Firm Name
        shopCode:
          type: integer
          example: 1234
        role:
          type: string
          enum:
            - SUPER_ADMIN
            - SHOP_OWNER
            - ADMIN
            - USER
          example: ADMIN
    LoginResponse:
      type: object
      properties:
        shopMenu:
          type: array
          items:
            $ref: '#/components/schemas/ShopMenu'
        token:
          type: string
          nullable: true
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          nullable: true
          example: null
        data:
          type: object
          nullable: true
        error:
          type: string
          example: Unexpected error
        timestamp:
          type: string
          format: date-time
    AreaRequest:
      type: object
      required:
        - areaName
        - stateCode
      properties:
        areaName:
          type: string
          example: Kanpur
        stateCode:
          type: string
          example: UP
    AreaResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        areaName:
          type: string
          example: Kanpur
        stateCode:
          type: string
          example: UP
        shopCode:
          type: integer
          example: 1234
        createdAt:
          type: string
          format: date-time
    AccountGroupRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Customers
        parentId:
          type: integer
          format: int64
          example: 1
    AccountGroupResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: Customers
    BrokerRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Rajesh Kumar
        phone:
          type: string
          example: '9876543210'
    BrokerResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: Rajesh Kumar
        phone:
          type: string
          example: '9876543210'
        createdAt:
          type: string
          format: date-time
    AccountEntryType:
      type: string
      enum:
        - DR
        - CR
    MailTo:
      type: object
      properties:
        mail_to_line_1:
          type: string
        mail_to_line_2:
          type: string
        mail_to_line_3:
          type: string
    RegistrationType:
      type: string
      enum:
        - COMPOSITION
        - CUSTOMER
        - REGULAR
        - UNREGISTERED
    PartyType:
      type: string
      enum:
        - NOT_APPLICABLE
        - DEEMED_EXPORT
        - GOVERNMENT_ENTITY
        - SEZ
    GstInDetail:
      type: object
      properties:
        registration_type:
          $ref: '#/components/schemas/RegistrationType'
        is_e_commerce_operator:
          type: boolean
        gst_in_uin:
          type: string
        party_type:
          $ref: '#/components/schemas/PartyType'
    LedgerRequest:
      type: object
      required:
        - name
      properties:
        gst_in_number:
          type: string
        name:
          type: string
        account_group:
          type: integer
          format: int64
        opening_balance:
          type: number
        account_entry_type:
          $ref: '#/components/schemas/AccountEntryType'
        legal_name:
          type: string
        Location:
          type: string
        country_name:
          type: string
        state_and_code:
          type: string
        mail_to:
          $ref: '#/components/schemas/MailTo'
        area_id:
          type: integer
          format: int64
        contact_person:
          type: string
        phone_number:
          type: integer
          format: int64
        pan:
          type: string
        credit_limit:
          type: number
        transport_id:
          type: integer
          format: int64
        tan_number:
          type: string
        broker_id:
          type: integer
          format: int64
        gstInDetailsPresent:
          type: boolean
        gst_in_details:
          $ref: '#/components/schemas/GstInDetail'
        aadhaar_number:
          type: string
        image_uploaded:
          type: boolean
        email:
          type: string
        msme_number:
          type: string
        distance:
          type: number
          format: double
        pin_code:
          type: string
        city:
          type: string
    LedgerArea:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        state_code:
          type: string
    LedgerBroker:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        phone:
          type: string
    LedgerTransport:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        phone:
          type: string
        gst:
          type: string
    GstInDetailResponse:
      type: object
      properties:
        registration_type:
          $ref: '#/components/schemas/RegistrationType'
        is_e_commerce_operator:
          type: boolean
        gst_in_uin:
          type: string
        party_type:
          $ref: '#/components/schemas/PartyType'
    LedgerAddress:
      type: object
      properties:
        address_line_1:
          type: string
        address_line_2:
          type: string
        address_line_3:
          type: string
        city:
          type: string
        state_id:
          type: string
        area_id:
          type: integer
          format: int64
        pincode:
          type: string
        distance:
          type: number
    LedgerResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        legal_name:
          type: string
        account_group_name:
          type: string
        opening_balance:
          type: number
        opening_balance_type:
          $ref: '#/components/schemas/AccountEntryType'
        credit_limit:
          type: number
        pan:
          type: string
        aadhaar:
          type: string
        tan:
          type: string
        email:
          type: string
        msme:
          type: string
        contact_person:
          type: string
        phone_number:
          type: integer
          format: int64
        gst_in_number:
          type: string
        location:
          type: string
        is_active:
          type: boolean
        area:
          $ref: '#/components/schemas/LedgerArea'
        broker:
          $ref: '#/components/schemas/LedgerBroker'
        transport:
          $ref: '#/components/schemas/LedgerTransport'
        gstin_details:
          $ref: '#/components/schemas/GstInDetailResponse'
        address:
          $ref: '#/components/schemas/LedgerAddress'
        created_at:
          type: string
          format: date-time
    LedgerSummaryColumn:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        width:
          type: integer
          format: int32
    LedgerSummaryItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        state:
          type: string
        area:
          type: string
        accountGroup:
          type: string
        gstin:
          type: string
    LedgerSummaryResponse:
      type: object
      properties:
        columns:
          type: array
          items:
            $ref: '#/components/schemas/LedgerSummaryColumn'
        data:
          type: array
          items:
            $ref: '#/components/schemas/LedgerSummaryItem'
    StateResponse:
      type: object
      properties:
        code:
          type: string
          example: UP
        name:
          type: string
          example: Uttar Pradesh
    TransportRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Blue Dart
        phone:
          type: string
          example: '9876543210'
        gstNo:
          type: string
          example: 09AAFCP1234A1Z5
    TransportResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: Blue Dart
        phone:
          type: string
          example: '9876543210'
        gstNo:
          type: string
          example: 09AAFCP1234A1Z5
        createdAt:
          type: string
          format: date-time
    MenuItem:
      type: object
      required:
        - id
        - title
        - icon
      properties:
        id:
          type: string
        title:
          type: string
        icon:
          type: string
        route:
          type: string
          nullable: true
        children:
          type: array
          items:
            $ref: '#/components/schemas/MenuItem'
    MenuResponse:
      type: object
      properties:
        Main Menu:
          type: array
          items:
            $ref: '#/components/schemas/MenuItem'
        Favourites:
          type: array
          items:
            $ref: '#/components/schemas/MenuItem'
  responses:
    UnauthorizedError:
      description: Access token is missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ForbiddenError:
      description: User is not authorized to perform this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
